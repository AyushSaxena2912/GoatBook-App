name: Deploy Backend to EC2

on:
  push:
    branches:
      - main
    paths:
      - 'backend/**'
      - '.github/workflows/deploy.yaml'

jobs:
  deploy:
    name: Deploy Backend
    runs-on: ubuntu-latest
    steps:
      - name: SSH and Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 16.171.4.104
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          script: |
            cd ~/GoatBook-App
            git pull origin main
            docker stop goatbook-api || true
            docker rm -f goatbook-api || true
            docker build -t goatbook-backend ./backend
            docker run -d --name goatbook-api --network host --restart unless-stopped --env-file ~/GoatBook-App/backend/.env -e NODE_ENV=production goatbook-backend
            echo "Deployment Completed Successfully!"
